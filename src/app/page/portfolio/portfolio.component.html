<!-- portfolio.component.html -->
<app-header></app-header>
<!-- Page Title Starts -->
<section class="title-section text-left text-sm-center revealator-slideup revealator-once revealator-delay1">
    <h1>my <span>portfolio</span></h1>
    <span class="title-bg">works</span>
</section>
<!-- Page Title Ends -->
<!-- Main Content Starts -->
<section class="main-content text-center revealator-slideup revealator-once revealator-delay1">
    <div class="container grid-gallery ">
        <!-- Portfolio Grid Starts -->
        <section class="grid-wrap">
            <ul class="row grid">
                <!-- Portfolio Item Starts -->
                <li *ngFor="let item of lh_portfolioItems; let i = index">
                    <figure>
                        <img [src]="item.src" alt="Portfolio Image" />
                        <div><span>{{ item.title }}</span></div>
                    </figure>
                </li>
                <!-- Portfolio Item Ends -->
            </ul>
        </section>
        <!-- Portfolio Grid Ends -->

        <!-- Portfolio Details Starts -->
        <section class="slideshow">
            <ul>
                <!-- Portfolio Item Detail Starts -->
                <li *ngFor="let item of lh_portfolioItems; let i = index">
                    <figure>
                        <figcaption>
                            <h3>{{ item.title }}</h3>
                            <div class="row">
                                <div class="col-12 col-sm-6 mb-2" *ngFor="let detail of item.details">
                                    <i [class]="detail.icon + ' pr-2'"></i><span class="project-label">{{ detail.label
                                        }} </span>:
                                    <span class="ft-wt-600 uppercase">{{ detail.value }}</span>
                                </div>
                            </div>
                        </figcaption>
                        <!-- Image Type -->
                        <div *ngIf="item.type === 'image'">
                            <img [src]="item.src" alt="Portfolio Image" />
                        </div>
                        <!-- Video Type -->
                        <div *ngIf="item.type === 'video'">
                            <iframe *ngIf="item.platform === 'youtube'" [src]="getSafeUrl(item.src)"
                                allowfullscreen></iframe>
                            <video *ngIf="item.platform === 'local'" class="responsive-video" controls
                                [poster]="item.poster">
                                <source [src]="item.src" type="video/mp4">
                            </video>
                        </div>
                        <!-- Carousel Type -->
                        <!-- <div *ngIf="item.type === 'carousel'">
                            <div id="carousel-{{i}}" class="carousel slide portfolio-slider" data-bs-ride="carousel"
                                data-bs-interval="false">

                                        [attr.data-bs-target]="'#carousel-'+i" [attr.data-bs-slide-to]="j"></li>
                                </ol>
                                <div class="carousel-inner">
                                    <div *ngFor="let slide of item.slides; let j = index" class="carousel-item"
                                        [class.active]="j === 0">
                                        <img [src]="slide.src" alt="Portfolio Image" />
                                    </div>
                                </div>
                                <button class="carousel-control-prev" type="button"
                                    [attr.data-bs-target]="'#carousel-'+i" data-bs-slide="prev">
                                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                    <span class="visually-hidden">Previous</span>
                                </button>
                                <button class="carousel-control-next" type="button"
                                    [attr.data-bs-target]="'#carousel-'+i" data-bs-slide="next">
                                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                    <span class="visually-hidden">Next</span>
                                </button>
                            </div>
                        </div> -->
                    </figure>
                </li>
                <!-- Portfolio Item Detail Ends -->
            </ul>
            <!-- Portfolio Navigation Starts -->
            <nav>
                <span class="icon nav-prev"><img src="assets/img/projects/navigation/left-arrow.png"
                        alt="previous"></span>
                <span class="icon nav-next"><img src="assets/img/projects/navigation/right-arrow.png" alt="next"></span>
                <span class="nav-close"><img src="assets/img/projects/navigation/close-button.png" alt="close"></span>
            </nav>
            <!-- Portfolio Navigation Ends -->
        </section>
    </div>
</section>
<!-- Main Content Ends -->
